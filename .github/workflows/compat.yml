name: Compat (Colly latest)

# Autonomy watchdog: weekly (and on demand) it pulls the newest Colly, then
# builds + tests against it. A red run means upstream shipped a breaking change
# — it opens/updates a tracking issue so we notice before users do. The
# proactive path is Renovate (renovate.json), which opens a version-bump PR that
# must pass this same CI before auto-merging.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true
      - name: Pull latest Colly
        run: go get -u github.com/gocolly/colly/v2@latest
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - name: Open an issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Compat break: gocolly/colly@latest";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "compat",
            });
            const body = `The weekly compatibility check failed against the latest Colly release.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["compat"],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number, body,
              });
            }
